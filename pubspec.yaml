name: test_your_learing
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  google_fonts: ^6.2.1

  intl: ^0.19.0
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.17
  shared_preferences: ^2.3.5

  connectivity_plus: ^6.1.3
  flutter_secure_storage: ^9.2.4
  markdown_widget: ^2.3.2+8
  webview_flutter: ^4.13.0
  #shimmer_animation: ^2.2.2
  shimmer: ^3.0.0
  dotted_border: ^2.1.0
  #file_picker: ^10.1.2
  image_picker: ^1.1.2
  path: ^1.9.1
  http: ^1.3.0
  http_parser: ^4.0.2
  percent_indicator: ^4.2.5

  record: ^6.0.0
  just_audio: ^0.10.4
  path_provider: ^2.1.5
  waveform_recorder: ^1.7.0
  audioplayers: ^6.5.0
  waved_audio_player: ^1.3.0
  permission_handler: ^12.0.1
  #animated_styled_widget: ^0.5.0
  glow_container: ^1.0.1
  google_sign_in: ^7.1.1
  get_storage: ^2.1.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.14.3"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/images/logo.png"  

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/profileicon/
    - assets/icons/score_progress/
    - assets/audio/hello.mp3


  fonts:
    - family: Mulish
      fonts:
        - asset: assets/fonts/Mulish-Light.ttf
        - asset: assets/fonts/Mulish-SemiBold.ttf

    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 900
        - asset: assets/fonts/Manrope-ExtraBold.ttf
        - asset: assets/fonts/Manrope-ExtraLight.ttf
        - asset: assets/fonts/Manrope-Light.ttf
        - asset: assets/fonts/Manrope-Medium.ttf
        - asset: assets/fonts/Manrope-Regular.ttf
        - asset: assets/fonts/Manrope-SemiBold.ttf    

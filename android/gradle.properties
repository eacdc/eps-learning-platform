# Use 4G heap to reduce JVM crash risk on machines with limited RAM; increase to 6G/8G if you have 16GB+ RAM
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseG1GC -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
# Disable daemon to avoid JVM crash; build will be slower but more stable
org.gradle.daemon=false
org.gradle.parallel=false
